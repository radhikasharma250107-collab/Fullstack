<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>

<h3>Expense Tracker</h3>

<input type="number" id="amt" placeholder="Amount">

<select id="cat">
    <option>Shopping</option>
    <option>Travel</option>
    <option>Food</option>
</select>

<button onclick="add()">Add</button>

<ul id="list"></ul>

<script>

let data = [];

function add() {
    let a = document.getElementById("amt").value;
    let c = document.getElementById("cat").value;

    if (a == "") return;

    data.push({id: Date.now(), amt: a, cat: c});
    show();

    document.getElementById("amt").value = "";
}

function show() {
    let ul = document.getElementById("list");
    ul.innerHTML = "";

    for (let i = 0; i < data.length; i++) {
        ul.innerHTML += 
            "<li>" + data[i].amt + " - " + data[i].cat +
            " <button onclick='del(" + data[i].id + ")'>Del</button>" +
            " <button onclick='upd(" + data[i].id + ")'>Upd</button></li>";
    }
}

function del(id) {
    data = data.filter(x => x.id != id);
    show();
}

function upd(id) {
    let item = data.find(x => x.id == id);

    let newAmt = prompt("New amount:", item.amt);
    if (newAmt != null && newAmt != "") {
        item.amt = newAmt;
    }

    show();
}

</script>

</body>
</html>
